<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELSA-V.0.3 | SESSION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="container">
        <div class="glass-card">
            <h1 class="title">ELSA-<span>V.0.3</span></h1>
            <p class="desc">ADVANCED SESSION GENERATOR</p>
            
            <div class="input-group">
                <input type="number" id="number" placeholder="917025xxxxxx">
                <button onclick="getPairCode()" id="btn">
                    <span id="txt">GET CODE</span>
                    <div class="loader" id="loader"></div>
                </button>
            </div>

            <div id="result" class="result-box">
                <p>PAIRING CODE:</p>
                <h2 id="pair-display">---- ----</h2>
                <button class="copy" onclick="copy()">COPY</button>
            </div>

            <p class="footer">POWERED BY <span>SATHAN</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
