    <script>
        // ടാബുകൾ മാറുന്നതിനുള്ള ഫങ്ക്ഷൻ
        function openTab(tabName) {
            const contents = document.querySelectorAll(".tab-content");
            const buttons = document.querySelectorAll(".tab-btn");
            
            contents.forEach(content => content.classList.remove("active"));
            buttons.forEach(btn => btn.classList.remove("active"));
            
            document.getElementById(tabName + "-tab").classList.add("active");
            event.currentTarget.classList.add("active");
        }

        // പെയറിംഗ് കോഡ് എടുക്കുന്നതിനുള്ള അപ്‌ഡേറ്റഡ് ഫങ്ക്ഷൻ
        async function getPairingCode() {
            const num = document.getElementById('phone').value;
            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result-box');
            const displayCode = document.getElementById('display-code');

            // നമ്പർ വാലിഡേഷൻ
            if (!num || num.length < 10) {
                return alert("രാജ്യത്തിന്റെ കോഡ് സഹിതം ശരിയായ നമ്പർ നൽകുക! (ഉദാ: 917025xxxxxx)");
            }

            // UI മാറ്റങ്ങൾ (Loading Start)
            btnText.style.display = "none";
            loader.style.display = "block";
            result.classList.remove('show');

            try {
                // API-ലേക്ക് റിക്വസ്റ്റ് അയക്കുന്നു
                const res = await fetch(`/api?number=${num}`);
                const data = await res.json();
                
                loader.style.display = "none";
                btnText.style.display = "block";

                if (data.code) {
                    result.classList.add('show');
                    displayCode.innerText = data.code;
                    // കോഡ് കിട്ടുമ്പോൾ ഒരു ചെറിയ വൈബ്രേഷൻ (സപ്പോർട്ട് ചെയ്യുന്ന ഫോണുകളിൽ)
                    if (navigator.vibrate) navigator.vibrate(50);
                } else {
                    alert("Error: " + (data.error || "കോഡ് ലഭിച്ചില്ല. ഒന്നുകൂടി ശ്രമിക്കൂ."));
                }
            } catch (e) {
                loader.style.display = "none";
                btnText.style.display = "block";
                alert("സർവറുമായി ബന്ധപ്പെടാൻ കഴിഞ്ഞില്ല. ഇന്റർനെറ്റ് അല്ലെങ്കിൽ Koyeb ലോഗ് പരിശോധിക്കൂ.");
            }
        }

        // QR Code എടുക്കുന്നതിനുള്ള അപ്‌ഡേറ്റഡ് ഫങ്ക്ഷൻ
        async function getQRCode() {
            const btnText = document.getElementById('qr-btn-text');
            const loader = document.getElementById('qr-loader');
            const result = document.getElementById('qr-result-box');
            const qrDisplay = document.getElementById('qr-display');

            btnText.style.display = "none";
            loader.style.display = "block";
            result.classList.remove('show');

            try {
                const res = await fetch(`/api`);
                const data = await res.json();
                
                loader.style.display = "none";
                btnText.style.display = "block";

                if (data.qr) {
                    result.classList.add('show');
                    qrDisplay.src = data.qr;
                } else {
                    alert("Error: QR കോഡ് ജനറേറ്റ് ചെയ്യാൻ കഴിഞ്ഞില്ല.");
                }
            } catch (e) {
                loader.style.display = "none";
                btnText.style.display = "block";
                alert("QR API എറർ! സർവർ ചെക്ക് ചെയ്യുക.");
            }
        }

        // കോഡ് കോപ്പി ചെയ്യാനുള്ള എളുപ്പവഴി
        function copyCode() {
            const code = document.getElementById('display-code').innerText;
            if (code === "---- ----") return;
            
            navigator.clipboard.writeText(code).then(() => {
                alert("കോഡ് കോപ്പി ചെയ്തു: " + code);
            }).catch(err => {
                // പഴയ ബ്രൗസറുകൾക്ക് വേണ്ടി
                const textArea = document.createElement("textarea");
                textArea.value = code;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert("കോഡ് കോപ്പി ചെയ്തു!");
            });
        }
    </script>
